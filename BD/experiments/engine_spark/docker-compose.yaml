services:
  spark-master:
    image: spark:4.1.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-master
    command:
      - /bin/bash
      - -lc
      - >
        /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
        --host spark-master
        --port 7077
        --webui-port 8080
    expose:
      - "7077"
      - "8080"
    ports:
      - "7077:7077"
      - "8080:8080"
    networks:
      - spark-cluster
    restart: unless-stopped

  spark-worker-1:
    image: spark:4.1.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-worker-1
    command:
      - /bin/bash
      - -lc
      - >
        /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
        spark://spark-master:7077
        --webui-port 8081
        --cores 2
        --memory 2g
    expose:
      - "8081"
    volumes:
      - ./data-worker:/opt/spark/data
    networks:
      - spark-cluster
    depends_on:
      - spark-master
    restart: unless-stopped

  spark-driver:
    image: spark:4.1.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-driver
    command: ["/bin/bash", "-lc", "sleep infinity"]
    environment:
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3
    ports:
      - "4040:4040"
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data-driver:/opt/spark/data
    networks:
      - spark-cluster
    depends_on:
      - spark-master
      - spark-worker-1
    restart: unless-stopped

networks:
  spark-cluster:
    driver: bridge
